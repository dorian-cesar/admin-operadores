version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Instalar pnpm de forma global para que esté disponible en el contenedor de compilación
        - npm install -g pnpm
        - pnpm config set only-built-dependencies msw,sharp
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
